name: PiEngine CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build-test:

    strategy:

      matrix:

        include:
          - os: ubuntu-latest
            compiler: gcc

          - os: ubuntu-latest
            compiler: clang

          - os: windows-latest
            compiler: msvc


    runs-on: ${{ matrix.os }}


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install Dependencies
        shell: bash
        run: |

          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then

            sudo apt update

            if [ "${{ matrix.compiler }}" = "gcc" ]; then

              sudo apt install -y \
                cmake \
                g++ \
                libgmp-dev \
                libtomlplusplus-dev \
                clang-format \
                clang-tidy

            else

              sudo apt install -y \
                cmake \
                clang \
                clang++ \
                libgmp-dev \
                libtomlplusplus-dev \
                clang-format \
                clang-tidy

            fi


          else

            choco install -y cmake
            choco install -y llvm

          fi

      - name: Configure
        shell: bash
        run: |

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then

            cmake -S . -B build

          else

            if [ "${{ matrix.compiler }}" = "gcc" ]; then

              export CXX=g++

            else

              export CXX=clang++

            fi


            cmake -S . -B build \
              -DENABLE_ASAN=ON \
              -DENABLE_UBSAN=ON

          fi


      - name: Build
        run: |
          cmake --build build

      - name: Format Check
        shell: bash
        run: |

          clang-format --dry-run --Werror \
            $(find include src tests \
            \( -name '*.cpp' -o -name '*.hpp' \))

      - name: Static Analysis
        if: ${{ matrix.compiler != 'msvc' }}
        run: |

          clang-tidy \
            -p build \
            $(find src -name '*.cpp')

      - name: Test
        run: |
          ctest --test-dir build --output-on-failure
